<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<title>クラシックオタマスター</title>
<meta name="description" content="クラシック音楽に合わせてオタマトーンを演奏できる練習アプリ。メトロノーム付き、楽譜は全部ドレミ表記。">
<meta name="theme-color" content="#2b1f4a">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="オタマスター">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="app">

  <!-- ============ ホーム ============ -->
  <section class="screen" id="screen-home">
    <header class="app-header">
      <h1>クラシック<span class="accent">オタマ</span>スター</h1>
      <p class="tagline">クラシックの名曲を、ドレミでオタマトーン演奏</p>
    </header>

    <div class="home-menu">
      <button class="home-btn" data-nav-home="practice" type="button">
        <span class="home-btn-title">演奏練習</span>
        <span class="home-btn-desc">好きな曲を選んで練習する</span>
      </button>
      <button class="home-btn" data-nav-home="performance" type="button">
        <span class="home-btn-title">本番演奏</span>
        <span class="home-btn-desc">スコア判定あり(準備中)</span>
      </button>
      <button class="home-btn" data-nav-home="library" type="button">
        <span class="home-btn-title">楽曲一覧</span>
        <span class="home-btn-desc">収録曲をすべて見る・お気に入り登録</span>
      </button>
    </div>

    <footer class="app-footer">
      <p>※ 楽譜は演奏しやすいよう簡略化した独自アレンジ(移動ド)です。原典の正確な採譜ではありません。</p>
      <p>収録曲はすべてパブリックドメインの作品です。</p>
    </footer>
  </section>

  <!-- ============ 難易度選択 ============ -->
  <section class="screen" id="screen-difficulty" hidden>
    <div class="screen-header">
      <button class="back-btn" data-back type="button">← 戻る</button>
      <h2 class="screen-title" id="difficultyTitle">演奏練習</h2>
      <button class="mode-switch-btn" id="difficultyModeSwitch" type="button"></button>
    </div>
    <div class="difficulty-buttons" id="difficultyButtons"></div>
  </section>

  <!-- ============ 楽曲一覧 ============ -->
  <section class="screen" id="screen-songlist" hidden>
    <div class="screen-header">
      <button class="back-btn" data-back type="button">← 戻る</button>
      <h2 class="screen-title" id="songlistTitle">楽曲一覧</h2>
    </div>
    <div class="song-list" id="songListEl"></div>
  </section>

  <!-- ============ 演奏画面 ============ -->
  <section class="screen" id="screen-player" hidden>
    <div class="screen-header">
      <button class="back-btn" data-back type="button">← 戻る</button>
      <div class="player-title-wrap">
        <h2 class="screen-title" id="playerTitle">曲名</h2>
        <p class="player-subtitle" id="playerSubtitle"></p>
      </div>
      <button class="mode-switch-btn" id="playerModeSwitch" type="button"></button>
    </div>

    <p class="mode-banner" id="modeBanner" hidden>採点機能は準備中です。今のところ演奏練習と同じ再生になります。</p>

    <section class="score-panel card">
      <div class="score-viewport" id="scoreViewport">
        <div class="playhead"></div>
        <div class="score-track" id="scoreTrack"></div>
      </div>
      <div class="now-playing" id="nowPlaying">
        <span class="now-note" id="nowNote">ド</span>
      </div>
      <p class="scrub-hint">楽譜を左右にスワイプすると、そこから再生できます</p>
    </section>

    <section class="transport-panel card">
      <div class="transport-buttons">
        <button id="playBtn" class="btn btn-play" type="button" aria-label="再生">
          <svg viewBox="0 0 24 24" class="icon icon-play"><path d="M8 5v14l11-7z"/></svg>
          <svg viewBox="0 0 24 24" class="icon icon-pause" hidden><path d="M6 5h4v14H6zM14 5h4v14h-4z"/></svg>
        </button>
        <button id="stopBtn" class="btn btn-stop" type="button" aria-label="停止">
          <svg viewBox="0 0 24 24" class="icon"><path d="M6 6h12v12H6z"/></svg>
        </button>
        <label class="loop-toggle">
          <input type="checkbox" id="loopCheck">
          <span>くり返し</span>
        </label>
      </div>

      <div class="tempo-row">
        <span class="field-label">テンポ</span>
        <button class="btn-small" id="bpmMinus" type="button" aria-label="テンポを下げる">－</button>
        <input type="range" id="bpmSlider" min="40" max="200" step="1" value="100">
        <button class="btn-small" id="bpmPlus" type="button" aria-label="テンポを上げる">＋</button>
        <span class="bpm-value"><span id="bpmValue">100</span> BPM</span>
        <button class="btn-small btn-reset" id="bpmReset" type="button">既定</button>
      </div>

      <div class="metro-row">
        <label class="metro-toggle">
          <input type="checkbox" id="metroCheck" checked>
          <span>メトロノーム音</span>
        </label>
        <input type="range" id="metroVolSlider" class="vol-slider" min="0" max="150" step="5" value="100" aria-label="メトロノームの音量">
        <span class="beat-dots" id="beatDots"></span>
      </div>

      <div class="metro-row">
        <label class="metro-toggle">
          <input type="checkbox" id="demoCheck">
          <span>お手本モード</span>
        </label>
        <input type="range" id="demoVolSlider" class="vol-slider" min="0" max="150" step="5" value="100" aria-label="お手本の音量">
      </div>
    </section>
  </section>

</div>

<script src="songs.js"></script>
<script src="app.js"></script>
</body>
</html>
